name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Step 1: run all quality checks before touching PyPI ──────────────────
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install httpx websockets
          pip install -e ".[dev]"

      - name: Ruff — lint + syntax errors
        run: ruff check tonpo/

      - name: Ruff — formatting check
        run: ruff format --check tonpo/

      - name: Mypy — type checking
        run: mypy tonpo/ --strict --ignore-missing-imports

      - name: Pytest
        run: pytest --tb=short

  # ── Step 2: only runs if quality job above passes ─────────────────────────
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: quality          # ← blocked until quality passes
    environment: pypi

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1